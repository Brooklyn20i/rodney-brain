name: Cadence Web

on:
  pull_request:
    paths:
      - "Cadence/web/**"
      - "docs/**"
      - ".github/workflows/cadence-web.yml"
  push:
    branches:
      - main
    paths:
      - "Cadence/web/**"
      - "docs/**"
      - ".github/workflows/cadence-web.yml"

permissions:
  contents: read

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cadence/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Cadence/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Verify checked-in GitHub Pages bundle
        run: |
          npm run build:docs
          git diff --exit-code -- ../../docs
