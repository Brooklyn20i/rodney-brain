name: Cadence web

on:
  push:
    paths:
      - 'Cadence/web/**'
      - '.github/workflows/cadence-web.yml'
  pull_request:
    paths:
      - 'Cadence/web/**'
      - '.github/workflows/cadence-web.yml'

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cadence/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Cadence/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Smoke tests
        run: npm test

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      # E2E is in CI (not just local) so the suite can't silently rot when the
      # app's routes or labels change — which is exactly how it broke before
      # (goto('/') hit the marketing site; the Fitness button became "Health").
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
