name: Cadence web

on:
  push:
    paths:
      - 'Cadence/web/**'
      - 'docs/**'
      - '.github/workflows/cadence-web.yml'
  pull_request:
    paths:
      - 'Cadence/web/**'
      - 'docs/**'
      - '.github/workflows/cadence-web.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cadence/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Cadence/web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
