name: Cadence web

on:
  push:
    paths:
      - 'Cadence/web/**'
      - '.github/workflows/cadence-web.yml'
  pull_request:
    paths:
      - 'Cadence/web/**'
      - '.github/workflows/cadence-web.yml'

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cadence/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Cadence/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Smoke tests
        run: npm test

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
