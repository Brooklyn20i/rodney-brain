name: Deploy Cadence to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Cadence/web/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Cadence/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Cadence/web

      - name: Build
        run: npm run build
        working-directory: Cadence/web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to GitHub Pages
        run: |
          rm -rf docs/assets
          cp -r Cadence/web/dist/* docs/
          touch docs/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
