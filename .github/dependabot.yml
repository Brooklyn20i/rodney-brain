version: 2
updates:
  # Active Cadence PWA only. Legacy standalone app directories are superseded
  # reference copies and are intentionally not monitored here.
  - package-ecosystem: npm
    directory: /Cadence/web
    schedule:
      interval: weekly
      day: sunday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    # TypeScript major upgrades must track @typescript-eslint peer support.
    # PR #53 proved Dependabot will otherwise propose unsupported TS 7 while
    # @typescript-eslint 8.x still declares peer support below 6.1.
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    groups:
      cadence-npm-production:
        dependency-type: production
        patterns:
          - "*"
      cadence-npm-development:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
      time: "06:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    groups:
      cadence-github-actions:
        patterns:
          - "*"
