<!DOCTYPE html>
<html lang="en" data-domain="fitness">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cadence Health" />
  <meta name="theme-color" content="#0B0E0C" />
  <link rel="manifest" href="/manifest-health.json" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/png" href="./icon-health-192.png?v=4" />
  <link rel="apple-touch-icon" href="./icon-health-180.png?v=4" />
  <title>Cadence Health</title>
  <style>
    html, body, #root {
      min-height: 100%;
      margin: 0;
      background: #0B0E0C;
      color: #F4F7F1;
    }
    body { overscroll-behavior: none; }
    .cadence-health-boot {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      box-sizing: border-box;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: radial-gradient(circle at 50% 0%, rgba(47, 120, 88, 0.28), transparent 36%), #0B0E0C;
    }
    .cadence-health-boot-card {
      width: min(340px, 100%);
      min-height: 180px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .cadence-health-boot-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      background: #2F7858;
      font-size: 24px;
    }
    .cadence-health-boot-title { margin: 0; font-weight: 800; letter-spacing: -0.02em; }
    .cadence-health-boot-subtitle { margin: 6px 0 0; color: rgba(244,247,241,0.68); font-size: 13px; }
  </style>
</head>
<body>
  <div id="root">
    <div class="cadence-health-boot" role="status" aria-live="polite">
      <div class="cadence-health-boot-card">
        <div>
          <div class="cadence-health-boot-mark" aria-hidden="true">✓</div>
          <p class="cadence-health-boot-title">Cadence Health</p>
          <p class="cadence-health-boot-subtitle">Loading your workout shell…</p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
